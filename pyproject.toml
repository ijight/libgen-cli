[project]
name = "libgen-cli"
version = "0.1.0"
description = "Lightweight, fast CLI for searching and downloading from arbitrary Library Genesis mirrors."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [{ name = "libgen-cli contributors" }]
keywords = ["libgen", "library-genesis", "cli", "ebooks", "downloader"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Environment :: Console",
    "Intended Audience :: End Users/Desktop",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Internet :: WWW/HTTP",
    "Topic :: Utilities",
]
dependencies = [
    "httpx>=0.27,<1.0",
    "selectolax>=0.3.21",
    "typer>=0.12",
    "rich>=13.7",
    "questionary>=2.0",
]

[project.scripts]
libgen = "libgen_cli.cli:app"

[project.urls]
Repository = "https://github.com/ianja/libgen-cli"

[dependency-groups]
dev = [
    "pytest>=8.0",
    "pytest-cov>=5.0",
    "respx>=0.21",
    "ruff>=0.6",
    "mypy>=1.11",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/libgen_cli"]

[tool.ruff]
line-length = 100
target-version = "py311"
src = ["src", "tests"]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "UP",  # pyupgrade
    "SIM", # flake8-simplify
    "RET", # flake8-return
    "RUF", # Ruff-specific
]
ignore = [
    "E501", # line length handled by formatter
]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["B011", "S101"]

[tool.mypy]
python_version = "3.11"
strict = true
warn_unreachable = true
warn_unused_ignores = true
files = ["src"]

[[tool.mypy.overrides]]
module = ["selectolax.*", "questionary.*"]
ignore_missing_imports = true

[tool.pytest.ini_options]
minversion = "8.0"
addopts = ["-q", "--strict-markers", "--strict-config"]
testpaths = ["tests"]
filterwarnings = ["error"]

[tool.coverage.run]
source = ["src/libgen_cli"]
branch = true
